<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="icon" href="/assets/ico.png">
  <title>Rudi Portfolio</title>
  <meta name="description" content="Portfolio de Rudi Herouard" />
  <script>
    const sites = ['fr', 'en']

    const rawUserLang = navigator.language || navigator.userLanguage;
    // console.log(rawUserLang);

    const userLang = rawUserLang.split('-')[0]
    // console.log(userLang);

    window.location.href = sites.includes(userLang) ? userLang : 'en';
  </script>
</head>
<body>
<!--If javascript failed?-->
  <ul>
    <li><a href="/en">English</a></li>
    <li><a href="/en">French</a></li>
  </ul>
</body>
</html>
